app = "parchment-studios"
primary_region = "lax"

[build]

[deploy]
  release_command = "/app/bin/migrate"

[env]
  PHX_HOST = "parchments.xyz"
  PORT = "4000"
  DATABASE_PATH = "/data/parchment_studios.db"
  POOL_SIZE = "5"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 500

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "parchment_data"
  destination = "/data"
  initial_size = "1gb"
